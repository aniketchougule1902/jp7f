name: jeevanpatra
description: "JeevanPatra - Healthcare At Your Fingertips"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Routing
  go_router: ^14.8.1
  
  # Supabase
  supabase_flutter: ^2.9.0
  
  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.5
  
  # Storage & Security
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3
  shared_preferences: ^2.3.5
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  
  # Icons
  iconsax: ^0.0.8
  
  # Charts
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/logo.png
